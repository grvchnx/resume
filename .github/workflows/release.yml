name: Build and Release Resume

on:
  push:
    branches:
      - main
    paths:
      - "**.tex"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile LaTeX Document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          args: -pdf -interaction=nonstopmode -synctex=1

      - name: Generate Tag and Release Name
        id: meta
        run: |
          DATE_TAG="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "tag=$DATE_TAG" >> $GITHUB_OUTPUT
          echo "release_name="Resume Release - $(date +'%B %d, %Y')"" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload PDF
        uses: softprops/action-gh-release@v1
        with:
          files: resume.pdf
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body: "Automated LaTeX build of the latest resume update."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
